<header class="site-header">
  <div class="site-header__inner">
    <div class="site-header__brand">
      <a href="{{ '/' | relative_url }}" class="site-header__title">{{ site.title }}</a>
      <span class="site-header__subtitle">{{ site.tagline }}</span>
    </div>
    <nav class="site-nav" aria-label="Main navigation">
      {% for item in site.data.navigation %}
        <a href="{{ item.url | relative_url }}"
           class="site-nav__link{% if page.url contains item.url %} active{% endif %}">
          {{ item.title }}
        </a>
      {% endfor %}
    </nav>
  </div>
</header>
