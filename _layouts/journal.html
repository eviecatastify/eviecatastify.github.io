---
layout: default
---

<a href="{{ '/journal/' | relative_url }}" class="back-link">Journal</a>

<article>
  <header class="entry-header">
    <time datetime="{{ page.date | date_to_xmlschema }}" class="mono">
      {{ page.date | date: "%Y-%m-%d" }}
    </time>
    <h1>{{ page.title }}</h1>
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
